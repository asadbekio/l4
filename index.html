<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Sizga atab 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --blush: #ffe3ec;
        --rose: #ffc2d4;
        --pink: #ff6b9d;
        --deeprose: #e84a7f;
        --gold: #ffd6a5;
        --plum: #5c2a3e;
        --white: #fff;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: 'Quicksand', sans-serif;
        color: var(--plum);
        background: linear-gradient(
          160deg,
          #ffe9f1 0%,
          #ffd0e0 45%,
          #ffbcd2 100%
        );
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        padding: 18px;
      }
      .bg-hearts {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .bg-hearts span {
        position: absolute;
        bottom: -40px;
        font-size: 22px;
        opacity: 0.35;
        animation: rise linear infinite;
      }
      @keyframes rise {
        0% {
          transform: translateY(0) scale(0.8) rotate(0);
          opacity: 0;
        }
        10% {
          opacity: 0.45;
        }
        100% {
          transform: translateY(-115dvh) scale(1.1) rotate(40deg);
          opacity: 0;
        }
      }
      .card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
        border-radius: 32px;
        padding: 32px 24px 28px;
        box-shadow:
          0 20px 50px rgba(232, 74, 127, 0.28),
          0 2px 0 rgba(255, 255, 255, 0.6) inset;
        text-align: center;
        min-height: 440px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .progress {
        display: flex;
        gap: 5px;
        justify-content: center;
        margin-bottom: 16px;
        min-height: 18px;
        flex-wrap: wrap;
      }
      .progress i {
        font-size: 14px;
        filter: grayscale(1);
        opacity: 0.35;
        transition: 0.3s;
        font-style: normal;
      }
      .progress i.on {
        filter: none;
        opacity: 1;
        transform: scale(1.15);
      }
      .eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--deeprose);
        opacity: 0.7;
        margin-bottom: 10px;
      }
      h1 {
        font-family: 'Pacifico', cursive;
        font-weight: 400;
        font-size: 32px;
        color: var(--deeprose);
        line-height: 1.25;
        margin-bottom: 8px;
      }
      .q {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.35;
        margin: 4px 0 22px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .sub {
        font-size: 15.5px;
        font-weight: 500;
        opacity: 0.85;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .answers {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        min-height: 220px;
        justify-content: center;
      }
      .btn {
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
        font-size: 18px;
        border: none;
        cursor: pointer;
        padding: 15px 20px;
        border-radius: 18px;
        width: 100%;
        max-width: 300px;
        color: #fff;
        background: linear-gradient(135deg, var(--pink), var(--deeprose));
        box-shadow: 0 8px 18px rgba(232, 74, 127, 0.35);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          left 0.18s ease,
          top 0.18s ease;
        touch-action: manipulation;
      }
      .btn:nth-child(2) {
        background: linear-gradient(135deg, #ff8fb1, #ff6f9c);
      }
      .btn:nth-child(3) {
        background: linear-gradient(135deg, #ffa3c4, #ff7faa);
      }
      .btn:active {
        transform: scale(0.96);
      }
      /* qochadigan (noto'g'ri) tugma */
      .btn.loose {
        position: absolute;
        width: auto;
        min-width: 120px;
        max-width: 180px;
        z-index: 5;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 34px;
        transform: translateX(-50%) translateY(20px);
        background: var(--plum);
        color: #fff;
        padding: 13px 20px;
        border-radius: 16px;
        font-weight: 600;
        font-size: 15px;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.25);
        max-width: 88vw;
        text-align: center;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .fade-in {
        animation: fadeIn 0.45s ease both;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(14px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .final h1 {
        font-size: 29px;
      }
      .big-heart {
        font-size: 72px;
        animation: beat 1.1s ease-in-out infinite;
        margin-bottom: 4px;
      }
      @keyframes beat {
        0%,
        100% {
          transform: scale(1);
        }
        15% {
          transform: scale(1.18);
        }
        30% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.12);
        }
      }
      .confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 40;
        overflow: hidden;
      }
      .confetti span {
        position: absolute;
        top: -30px;
        font-size: 24px;
        animation: fall linear forwards;
      }
      @keyframes fall {
        to {
          transform: translateY(110dvh) rotate(360deg);
          opacity: 0;
        }
      }
      @media (max-width: 380px) {
        h1 {
          font-size: 29px;
        }
        .q {
          font-size: 20px;
        }
        .card {
          padding: 28px 18px 24px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .bg-hearts span,
        .big-heart,
        .confetti span {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-hearts" id="bgHearts"></div>
    <div class="confetti" id="confetti"></div>
    <div class="card fade-in" id="card"></div>
    <div class="toast" id="toast"></div>

    <script>
      /* ============================================================
   ⬇️  BU YERNI O'ZGARTIRING — qizingiz ismini yozing:
============================================================ */
      const ISMI = 'Ruxshonam';
      /* ============================================================ */

      const card = document.getElementById('card');
      const toastEl = document.getElementById('toast');

      /* Noto'g'ri tugma bosilganda chiqadigan umumiy gaplar */
      const defaultWrong = [
        'Noto‘g‘ri javob! 🙈',
        'Ushlolmaysiz 🏃‍♀️',
        'Faqat to‘g‘risini bosing 😘',
        'Yana urinib ko‘ring 😜',
        'Yo‘q-yo‘q, to‘g‘risini 💕',
      ];

      /* ---- savollar ---- */
      const questions = [
        {
          q: '1) Kim chiroyli? 👀',
          options: [
            { t: '😊 Men', ok: false },
            { t: '🌸 Siz', ok: false },
            { t: '💖 Ikkalamiz birga', ok: true },
          ],
        },
        {
          q: '2) Romantik uchrashuvlarni yoqtirasizmi? 🌹',
          options: [
            { t: '🌷 Ha', ok: true },
            {
              t: '🙃 Yo‘q',
              ok: false,
              msg: 'Hali romantikaga ko‘mib tashlayman sizni 😏',
            },
          ],
        },
        {
          q: '3) Birga sayr qilishni xohlaysizmi? 🌙',
          options: [
            { t: '🚶‍♂️❤️🚶‍♀️ Albatta', ok: true },
            {
              t: '🤭 Bilmayman',
              ok: false,
              msg: 'Hali ko‘p-ko‘p birga sayr qilamiz, “Albatta”ni bosing 🌙',
            },
          ],
        },
        {
          q: '4) Men bilan ko‘proq vaqt o‘tkazishni xohlaysizmi? 💕',
          options: [
            { t: '🥰 Ha', ok: true },
            { t: '🤔 Balki', ok: false },
          ],
        },
        {
          q: '5) Agar men sizni qahvaga taklif qilsam... ☕',
          options: [
            { t: '💖 Roziman', ok: true },
            { t: '😊 O‘ylab ko‘raman', ok: false },
          ],
        },
        {
          q: '6) Meni tez-tez eslab sog‘inasizmi? 🥰',
          options: [
            { t: '🥰 Ha', ok: true },
            { t: '🙃 Yo‘q', ok: false },
          ],
        },
        {
          q: '7) Meni yaxshi ko‘rasizmi? 🥹',
          options: [
            { t: '💕 Ha', ok: true },
            { t: '🙈 Yo‘q', ok: false },
          ],
        },
      ];

      let idx = 0;

      function progressHTML() {
        let h = '<div class="progress">';
        for (let i = 0; i < questions.length; i++) {
          h += `<i class="${i <= idx ? 'on' : ''}">${i <= idx ? '❤️' : '🤍'}</i>`;
        }
        return h + '</div>';
      }

      function renderStart() {
        card.className = 'card fade-in';
        card.innerHTML = `
    <div class="eyebrow">Faqat siz uchun</div>
    <div class="big-heart">💌</div>
    <h1>Salom, ${ISMI}!</h1>
    <p class="sub">Sizga atab kichkina o‘yin tayyorladim 🌸<br>
    Faqat to‘g‘ri javob bersangiz, oxiriga yetasiz 😉</p>
    <div class="answers">
      <button class="btn" id="startBtn">Boshlaymiz 💕</button>
    </div>`;
        document.getElementById('startBtn').onclick = () => {
          idx = 0;
          renderQuestion();
        };
      }

      function renderQuestion() {
        const q = questions[idx];
        card.className = 'card fade-in';
        const btns = q.options
          .map((o, i) => `<button class="btn" data-i="${i}">${o.t}</button>`)
          .join('');
        card.innerHTML = `
    ${progressHTML()}
    <div class="eyebrow">${idx + 1} / ${questions.length}</div>
    <div class="q">${q.q}</div>
    <div class="answers" id="answers">${btns}</div>`;
        wire(q);
      }

      function wire(q) {
        const area = document.getElementById('answers');
        card.querySelectorAll('.btn').forEach((btn) => {
          const o = q.options[+btn.dataset.i];
          if (o.ok) {
            btn.onclick = () => next();
          } else {
            const dodge = (e) => {
              if (e) e.preventDefault();
              if (!btn.classList.contains('loose')) btn.classList.add('loose');
              const aw = area.clientWidth,
                ah = area.clientHeight;
              const bw = btn.offsetWidth || 140,
                bh = btn.offsetHeight || 50;
              const x = Math.random() * Math.max(0, aw - bw);
              const y = Math.random() * Math.max(0, ah - bh);
              btn.style.left = x + 'px';
              btn.style.top = y + 'px';
            };
            btn.addEventListener('mouseenter', dodge);
            btn.addEventListener('touchstart', dodge, { passive: false });
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              dodge();
              showToast(o.msg || pick(defaultWrong));
            });
          }
        });
      }

      function next() {
        idx++;
        if (idx >= questions.length) {
          renderFinal();
          return;
        }
        renderQuestion();
      }

      function renderFinal() {
        card.className = 'card fade-in final';
        card.innerHTML = `
    ${progressHTML()}
    <div class="big-heart">💖</div>
    <h1>Men buni bilardim, ${ISMI}!</h1>
    <p class="sub">Siz mening eng katta baxtimsiz 🌷<br>
    Siz ❤️</p>
    <div class="answers">
      <button class="btn" id="again">Yana o‘ynash 💕</button>
    </div>`;
        document.getElementById('again').onclick = () => {
          idx = 0;
          renderStart();
        };
        burst();
      }

      let toastTimer;
      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1900);
      }

      function burst() {
        const box = document.getElementById('confetti');
        const emojis = ['💖', '💕', '🌸', '💗', '✨', '🌹', '💞', '🎀'];
        for (let i = 0; i < 60; i++) {
          const s = document.createElement('span');
          s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          s.style.left = Math.random() * 100 + 'vw';
          s.style.fontSize = 16 + Math.random() * 22 + 'px';
          s.style.animationDuration = 2.2 + Math.random() * 2.2 + 's';
          s.style.animationDelay = Math.random() * 0.6 + 's';
          box.appendChild(s);
          setTimeout(() => s.remove(), 5200);
        }
      }

      (function bgHearts() {
        const box = document.getElementById('bgHearts');
        const e = ['💗', '💕', '🌸', '🤍', '💞'];
        for (let i = 0; i < 14; i++) {
          const s = document.createElement('span');
          s.textContent = e[i % e.length];
          s.style.left = Math.random() * 100 + 'vw';
          s.style.fontSize = 14 + Math.random() * 16 + 'px';
          s.style.animationDuration = 9 + Math.random() * 9 + 's';
          s.style.animationDelay = Math.random() * 9 + 's';
          box.appendChild(s);
        }
      })();

      function pick(a) {
        return a[Math.floor(Math.random() * a.length)];
      }
      renderStart();
    </script>
  </body>
</html>
